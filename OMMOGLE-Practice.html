<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOG ARENA — SOLO SCAN</title>
<script type="module">
import { FaceLandmarker, FilesetResolver, DrawingUtils } from
  "./vision_bundle.js";

// ── helpers ───────────────────────────────────────────────────────────────────
const clampR = (e, t, r) => Math.max(t, Math.min(r, e));
const dist   = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const atan2deg = (y, x) => Math.atan2(y, x) * (180 / Math.PI);

// scoreRange: maps a value to 0–10, 10 in [ideal_lo, ideal_hi], tapering to 0 outside [outer_lo, outer_hi]
function scoreRange(e, idealLo, idealHi, outerLo, outerHi) {
  if (!Number.isFinite(e)) return 0;
  if (e >= idealLo && e <= idealHi) return 10;
  if (e < idealLo) return clampR((e - outerLo) / (idealLo - outerLo) * 10, 0, 10);
  return clampR((outerHi - e) / (outerHi - idealHi) * 10, 0, 10);
}

// Symmetry pairs (exact from real site source)
const SYM_PAIRS = [
  [33,263],[133,362],[70,300],[63,293],[105,334],
  [46,276],[116,345],[123,352],[50,280],[187,411],
  [132,361],[174,399],[150,379],[172,397],[136,365],
  [171,396],[148,377],[176,401],[58,288]
];

function scoreLandmarks(e, opts = {}) {
  if (!e || e.length < 468) return null;

  const videoWidth  = opts.videoWidth  || 1;
  const videoHeight = opts.videoHeight || 1;
  const aspect = videoHeight > 0 ? videoWidth / videoHeight : 1;

  // Aspect-correct x so geometry is in real proportions
  const ac = lm => ({ x: lm.x * aspect, y: lm.y, z: lm.z || 0 });

  // ── head roll ─────────────────────────────────────────────────────────────
  const roll = atan2deg(ac(e[10]).x - ac(e[152]).x, ac(e[152]).y - ac(e[10]).y) - 90; // approx from source
  // Real source: atan2(e[152].y-e[10].y, e[152].x-e[10].x)*180/PI - 90 gives canthal tilt reference
  // Actually source computes: l(u(e[10]),u(e[152]))-90  where l=atan2 in degrees
  const rollDeg = atan2deg(ac(e[152]).y - ac(e[10]).y, ac(e[152]).x - ac(e[10]).x) - 90;

  // nose pivot point
  const pivot = ac(e[1]);

  // Rotate landmark around pivot by -rollDeg to de-roll the face
  function rotated(idx) {
    const p = ac(e[idx]);
    const ang = -rollDeg * Math.PI / 180;
    const cosA = Math.cos(ang), sinA = Math.sin(ang);
    const dx = p.x - pivot.x, dy = p.y - pivot.y;
    return { x: pivot.x + dx*cosA - dy*sinA, y: pivot.y + dx*sinA + dy*cosA, z: p.z || 0 };
  }

  // ── canthal tilt (degrees, positive = outer corner higher = good) ─────────
  // Source: average of left+right eye axis angles, negated
  const eyeAngleL = atan2deg(rotated(133).y - rotated(33).y,  rotated(133).x - rotated(33).x);
  const eyeAngleR = atan2deg(rotated(263).y - rotated(362).y, rotated(263).x - rotated(362).x);
  const canthalTilt = -((eyeAngleL + eyeAngleR) / 2); // degrees; positive = positive tilt

  // ── face bounding box (de-rolled) ────────────────────────────────────────
  const faceW = dist(rotated(234), rotated(454));
  const faceH = dist(rotated(10),  rotated(152));

  // ── jaw width ratio (mouth width / face width) ────────────────────────────
  // Source: jawWidth = dist(234,454) used as width; 3 mouth-open landmark pairs
  let maxMouth = 0;
  for (const [a, b] of [[172,397],[150,379],[171,396]]) {
    const d = dist(rotated(a), rotated(b));
    if (d > maxMouth) maxMouth = d;
  }
  const jawWidth = faceH > 0 ? maxMouth / faceH : 0; // O in source

  // ── symmetry (0–100 integer) ───────────────────────────────────────────────
  const faceCX = (rotated(133).x + rotated(362).x) / 2;
  const faceCY = (rotated(10).y  + rotated(152).y) / 2;
  let symDiff = 0;
  for (const [l, r] of SYM_PAIRS) {
    const lp = rotated(l), rp = rotated(r);
    const lox = Math.abs(lp.x - faceCX), rox = Math.abs(rp.x - faceCX);
    const loy = Math.abs(lp.y - faceCY), roy = Math.abs(rp.y - faceCY);
    symDiff += (faceW > 0 ? Math.abs(lox - rox) / faceW : 0)
             + (faceH > 0 ? Math.abs(loy - roy) / faceH : 0);
  }
  const symmetry = Math.round((1 - clampR(symDiff / (2 * SYM_PAIRS.length) / 0.09, 0, 1)) * 100);

  // ── midface ratio (nose tip y position relative to face height) ───────────
  const eyeMidY = (rotated(133).y + rotated(362).y) / 2; // avg of inner eye corners
  const noseTipY = Math.abs(rotated(0).y - eyeMidY);
  const midfaceRatio = faceH > 0 ? noseTipY / faceH : 0; // k in source

  // ── cheekbone width (face width / jaw width) ──────────────────────────────
  const jawW_px = dist(rotated(234), rotated(454)); // re-use face width as proxy
  const cheekboneWidth = maxMouth > 0 ? jawW_px / maxMouth : 0; // N in source

  // ── eye aspect ratio (openness, lower = more hunter) ─────────────────────
  const eyeOpenL  = dist(rotated(159), rotated(145));
  const eyeWidthL = dist(rotated(33),  rotated(133));
  const eyeOpenR  = dist(rotated(386), rotated(374));
  const eyeWidthR = dist(rotated(263), rotated(362));
  const eyeAspectRatio = Math.max(0.2,
    ((eyeWidthL > 0 ? eyeOpenL / eyeWidthL : 0) +
     (eyeWidthR > 0 ? eyeOpenR / eyeWidthR : 0)) / 2
  ); // L in source

  // ── inter-eye ratio (eye distance / face width) ───────────────────────────
  const eyeDist = faceW > 0 ? dist(rotated(133), rotated(362)) / faceW : 0;

  // ── component scores (0–10 each) ─────────────────────────────────────────
  const sCanthal   = scoreRange(canthalTilt,    2,    6.5,  -2,   11);
  const sJawWidth  = scoreRange(jawWidth,        0.58, 0.78,  0.42, 0.96);
  const sMidface   = scoreRange(midfaceRatio,    0.27, 0.34,  0.20, 0.43);
  const sCheek     = scoreRange(cheekboneWidth,  1.04, 1.24,  0.86, 1.48);
  const sEye       = scoreRange(eyeAspectRatio,  0.22, 0.30,  0.18, 0.43);
  const sEyeDist   = scoreRange(eyeDist,         0.22, 0.31,  0.15, 0.42);

  // ── harmony (weighted sub-composite, 0–10) ────────────────────────────────
  // Source: U = round((0.18*X + 0.24*A + 0.18*J + 0.16*G + 0.24*eyeDist)*10)/10
  // where X=sJawWidth, A=sMidface, J=sCheek, G=sEye
  const harmony = Math.round(
    (0.18 * sJawWidth + 0.24 * sMidface + 0.18 * sCheek + 0.16 * sEye + 0.24 * sEyeDist) * 10
  ) / 10;

  // ── overall (before confidence scaling) ───────────────────────────────────
  // Source: $ = 0.12*W + 0.14*X + E/10*0.24 + 0.14*A + 0.1*J + 0.08*G + 0.18*U
  // W=sCanthal, X=sJawWidth, E=symmetry(0-100), A=sMidface, J=sCheek, G=sEye, U=harmony
  const rawOverall =
    0.12 * sCanthal +
    0.14 * sJawWidth +
    (symmetry / 10) * 0.24 +
    0.14 * sMidface +
    0.10 * sCheek +
    0.08 * sEye +
    0.18 * harmony;

  // ── confidence scaling ────────────────────────────────────────────────────
  // In the real app, validation gives a confidence [0,1]. Without live validation
  // we assume a "warning"-level confidence of ~0.7 (good lighting, face detected).
  // Source: "warning" → clampR(0.45 + 0.35 * confidence, 0.55, 0.78)
  // We use confidence=0.7 as default (camera is on, face detected).
  const confidence = opts.confidence !== undefined ? opts.confidence : 0.7;
  const scaleFactor = clampR(0.45 + 0.35 * confidence, 0.55, 0.78);

  const overall = Math.round(10 * clampR(rawOverall * scaleFactor, 1.1, 10)) / 10;

  // ── dominant feature & flaw (matches f() in real source) ─────────────────
  // Component scores mapped to trait labels (same order as source)
  const traits = [
    { name: "Symmetry",      score: symmetry / 10, good: "Balanced Facial Thirds",  bad: "Poor Facial Harmony" },
    { name: "Canthal Tilt",  score: sCanthal / 10, good: "Positive Canthal Tilt",   bad: "Negative Canthal Tilt" },
    { name: "Jawline",       score: sJawWidth / 10,good: "Strong Jawline",           bad: "Weak Jawline" },
    { name: "Midface",       score: sMidface / 10, good: "Forward Maxilla",          bad: "Recessed Maxilla" },
    { name: "Cheekbones",    score: sCheek / 10,   good: "High Cheekbones",          bad: "Flat Cheekbones" },
    { name: "Eye Shape",     score: sEye / 10,     good: "Hunter Eyes",              bad: "Long Philtrum" },
    { name: "Harmony",       score: harmony / 10,  good: "Forward-Grown Chin",       bad: "Recessed Chin" },
  ];
  traits.sort((a, b) => b.score - a.score);
  const dominant = traits[0].good;
  const flaw     = traits[traits.length - 1].bad;

  // Sub-scores normalized to 0–1 for bar display
  const sub = {
    canthalTilt:     clampR(sCanthal   / 10, 0, 1),
    jawWidth:        clampR(sJawWidth  / 10, 0, 1),
    symmetry:        clampR(symmetry   / 100, 0, 1),
    midfaceRatio:    clampR(sMidface   / 10, 0, 1),
    cheekboneWidth:  clampR(sCheek     / 10, 0, 1),
    eyeAspectRatio:  clampR(sEye       / 10, 0, 1),
    harmony:         clampR(harmony    / 10, 0, 1),
  };

  return { overall, dominant, flaw, sub, rawScores: { canthalTilt, jawWidth, symmetry, midfaceRatio, cheekboneWidth, eyeAspectRatio, harmony } };
}

// ── tier system (exact from real site: 20503 module, oO function) ─────────────
const TIERS = [
  { name:"Molecule", emoji:"🗿", hexColor:"#cbd5e1", minElo:-Infinity, maxElo:-1 },
  { name:"Sub3",     emoji:"🦀", hexColor:"#b45309", minElo:1,    maxElo:500 },
  { name:"LTN",      emoji:"🌙", hexColor:"#34d399", minElo:501,  maxElo:1000 },
  { name:"MTN",      emoji:"⭐", hexColor:"#86efac", minElo:1001, maxElo:1500 },
  { name:"HTN",      emoji:"🌟", hexColor:"#a3e635", minElo:1501, maxElo:2000 },
  { name:"Chadlite", emoji:"⚜️", hexColor:"#facc15", minElo:2001, maxElo:3500 },
  { name:"Chad",     emoji:"👑", hexColor:"#fb923c", minElo:3501, maxElo:5000 },
  { name:"Slayer",   emoji:"☠️", hexColor:"#f472b6", minElo:5001, maxElo:20000 },
  { name:"Adam",     emoji:"🍎", hexColor:"#ef4444", minElo:20001,maxElo:null },
];

// oO: map overall score (0–10) to a tier (same thresholds as real site)
function tierFromOverall(score) {
  const s = Math.max(0, Math.min(10, score || 0));
  const name = s >= 9.7 ? "Adam"
             : s >= 9.5 ? "Slayer"
             : s >= 8.9 ? "Chad"
             : s >= 8.3 ? "Chadlite"
             : s >= 7.0 ? "HTN"
             : s >= 5.6 ? "MTN"
             : s >= 3.1 ? "LTN"
             : "Sub3";
  return TIERS.find(t => t.name === name) || TIERS[1];
}

// ── main ─────────────────────────────────────────────────────────────────────
const video   = document.getElementById("webcam");

let landmarker = null;
let lastLandmarks = null;
let scoreHistory = [];
let smoothScore = null;

async function init() {
  document.getElementById("status").textContent = "LOADING AI MODEL…";
  try {
    const fr = await FilesetResolver.forVisionTasks(
      "./"
    );
    landmarker = await FaceLandmarker.createFromOptions(fr, {
      baseOptions: { modelAssetPath: "./face_landmarker.task" },
      numFaces: 1,
      runningMode: "VIDEO",
      outputFaceBlendshapes: false,
    });
    document.getElementById("status").textContent = "STARTING CAMERA…";
    await startCamera(null);
  } catch(err) {
    document.getElementById("status").textContent = "ERROR: " + err.message;
  }
}

function loop(ts) {
  requestAnimationFrame(loop);

  // size canvas to video
  if (!video.videoWidth) return;

  const result = landmarker.detectForVideo(video, ts);
  if (!result?.faceLandmarks?.[0]) {
    lastLandmarks = null;
    updateUI(null);
    return;
  }

  lastLandmarks = result.faceLandmarks[0];

  const score = scoreLandmarks(lastLandmarks, {
    videoWidth:  video.videoWidth,
    videoHeight: video.videoHeight,
  });
  if (!score) return;

  // smooth score over last 10 frames
  scoreHistory.push(score.overall);
  if (scoreHistory.length > 10) scoreHistory.shift();
  smoothScore = scoreHistory.reduce((a,b)=>a+b,0) / scoreHistory.length;

  updateUI({ ...score, overall: smoothScore });

}

function bar(val) {
  const pct = Math.round(val * 100);
  const color = val > 0.65 ? "#a855f7" : val > 0.4 ? "#ffd54a" : "#fca5a5";
  return `<div class="bar-row">
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="bar-pct">${pct}</span>
  </div>`;
}

const LABELS = {
  canthalTilt:    "CANTHAL TILT",
  jawWidth:       "JAWLINE",
  symmetry:       "SYMMETRY",
  midfaceRatio:   "MIDFACE",
  cheekboneWidth: "CHEEKBONES",
  eyeAspectRatio: "EYE SHAPE",
  harmony:        "HARMONY",
};

function updateUI(score) {
  const scoreEl = document.getElementById("score-panel");
  if (!score) {
    scoreEl.innerHTML = `<div class="no-face">NO FACE DETECTED</div>`;
    return;
  }
  const tier = tierFromOverall(score.overall);
  scoreEl.innerHTML = `
    <div class="overall">${score.overall.toFixed(1)}</div>
    <div class="tier" style="color:${tier.hexColor}">${tier.emoji} ${tier.name.toUpperCase()}</div>
    <div class="don-flaw">
      <span class="don">✦ ${score.dominant.toUpperCase()}</span>
      <span class="flaw">✦ ${score.flaw.toUpperCase()}</span>
    </div>
    <div class="sub-scores">
      ${Object.entries(score.sub).map(([k, v]) =>
        `<div class="sub-row">
          <span class="sub-label">${LABELS[k] || k}</span>
          ${bar(v)}
        </div>`
      ).join("")}
    </div>
  `;
}

init();

// ── camera selector ──────────────────────────────────────────────────────────
let currentDeviceId = null;
let loopStarted = false;
let shouldMirror = true;

async function startCamera(deviceId) {
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }
  const constraints = {
    video: { width: { ideal: 720 }, height: { ideal: 1280 }, ...(deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "user" }) }
  };
  const stream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = stream;
  await video.play();
  const track = stream.getVideoTracks()[0];
  currentDeviceId = track?.getSettings()?.deviceId;
  const facingMode = track?.getSettings()?.facingMode;
  shouldMirror = (facingMode === "user" || facingMode === undefined);
  document.getElementById("status-wrap").style.display = "none";
  if (!loopStarted) {
    loopStarted = true;
    requestAnimationFrame(loop);
    const canvas = document.getElementById("mirror-canvas");
    const ctx = canvas.getContext("2d");
    function drawMirror() {
      if (video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.save();
        if (shouldMirror) {
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
        }
        ctx.drawImage(video, 0, 0);
        ctx.restore();
      }
      requestAnimationFrame(drawMirror);
    }
    drawMirror();
  }
  renderCamOptions();
}

async function renderCamOptions() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d => d.kind === "videoinput");
  const dropdown = document.getElementById("cam-dropdown");
  dropdown.innerHTML = cams.map((d, i) =>
    `<button class="cam-option${d.deviceId === currentDeviceId ? " active" : ""}" data-id="${d.deviceId}">
      ${d.label || "CAMERA " + (i + 1)}
    </button>`
  ).join("");
  dropdown.querySelectorAll(".cam-option").forEach(btn => {
    btn.addEventListener("click", async () => {
      dropdown.classList.add("hidden");
      await startCamera(btn.dataset.id);
    });
  });
}

const camBtn = document.getElementById("cam-btn");
const camDropdown = document.getElementById("cam-dropdown");
camBtn.addEventListener("click", async (e) => {
  e.stopPropagation();
  await renderCamOptions();
  camDropdown.classList.toggle("hidden");
});
document.addEventListener("click", () => camDropdown.classList.add("hidden"));
</script>
